<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primer Cumpleaños de Noah</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
overflow:hidden;
background:linear-gradient(#8ed6ff,#ffffff);
}

.estrellas{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
font-size:25px;
animation:brillar 2s infinite alternate;
}

@keyframes brillar{
from{opacity:.3;}
to{opacity:1;}
}

.globo{
position:fixed;
bottom:-100px;
font-size:55px;
animation:volar 12s linear infinite;
}

.globo1{left:10%;}
.globo2{left:35%;animation-delay:3s;}
.globo3{left:60%;animation-delay:6s;}
.globo4{left:85%;animation-delay:9s;}

@keyframes volar{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.regalo{
font-size:120px;
margin-top:140px;
cursor:pointer;
animation:saltar 1.5s infinite;
}

@keyframes saltar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

#contenido{
display:none;
padding:20px;
animation:aparecer 2s;
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

img{
width:90%;
max-width:550px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

h1{
color:#005b96;
font-size:45px;
}

h2{
color:#555;
}

</style>
</head>

<body>

<div class="estrellas">
✨ ⭐ ✨ ⭐ ✨ ⭐ ✨
</div>

<div class="globo globo1">🎈</div>
<div class="globo globo2">🎈</div>
<div class="globo globo3">🎈</div>
<div class="globo globo4">🎈</div>

<div id="regalo" class="regalo" onclick="abrirInvitacion()">
🎁
<br>
<h3>Toca el regalo</h3>
</div>

<div id="contenido">

<h1>🎂 Primer Cumpleaños de Noah 🎂</h1>

<h2>¡Bienvenida, Familia Meza!</h2>

<p>
Con mucha alegría queremos compartir este día tan especial con ustedes.
</p>

<br>

<img src="IMG-20260628-WA0037.jpg">

<br><br>

<audio id="musica" loop controls>
<source src="cumpleaños.m4a" type="audio/mp4">
</audio>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function abrirInvitacion(){

document.getElementById("regalo").style.display="none";

document.getElementById("contenido").style.display="block";

document.getElementById("musica").play();

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
});

}

</script>

</body>
</html>
